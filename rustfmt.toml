# max_width = 100
# hard_tabs = false
# tab_spaces = 4
# newline_style = "Auto"
# indent_style = "Block"
# use_small_heuristics = "Default"
# fn_call_width = 60 # Default as 60% of max_width
# attr_fn_like_width = 70 # Default as 70% of max_width
# struct_lit_width = 18 # Default as 18% of max_width
# struct_variant_width = 35 # Default as 35% of max_width
# array_width = 60 # Default as 60% of max_width
# chain_width = 60 # Default as 60% of max_width
single_line_if_else_max_width = 60 # Default as 50% of max_width
# single_line_let_else_max_width = 50 # Default as 50% of max_width
# wrap_comments = false
format_code_in_doc_comments = true
# doc_comment_code_block_width = 100
# comment_width = 80
normalize_comments = true
normalize_doc_attributes = true
format_strings = true
format_macro_matchers = true
# format_macro_bodies = true
# skip_macro_invocations = []
hex_literal_case = "Upper"
# empty_item_single_line = true
# struct_lit_single_line = true
fn_single_line = true
# where_single_line = false
# imports_indent = "Block"
imports_layout = "HorizontalVertical"
imports_granularity = "Preserve"
group_imports = "StdExternalCrate"
# reorder_imports = true
# reorder_modules = true
reorder_impl_items = true
# type_punctuation_density = "Wide"
# space_before_colon = false
# space_after_colon = true
# spaces_around_ranges = false
# binop_separator = "Front"
# remove_nested_parens = true
# combine_control_expr = true # Don't do that
# short_array_element_width_threshold = 10
# overflow_delimited_expr = false
struct_field_align_threshold = 20
enum_discrim_align_threshold = 20
# match_arm_blocks = true
# match_arm_leading_pipes = "Never"
# force_multiline_blocks = true
# fn_params_layout = "Tall"
# brace_style = "SameLineWhere"
control_brace_style = "AlwaysNextLine"
# trailing_semicolon = true
# trailing_comma = "Vertical"
match_block_trailing_comma = true
# blank_lines_upper_bound = 1
# blank_lines_lower_bound = 0
edition = "2024"
style_edition = "2024"
# version = "One"
# inline_attribute_width = 0
# format_generated_files = true
# generated_marker_line_search_limit = 5
# merge_derives = true
use_try_shorthand = true
use_field_init_shorthand = true
# force_explicit_abi = true
# condense_wildcard_suffixes = true
# color = "Auto"
# required_version = "1.8.0"
unstable_features = true
# disable_all_formatting = false
# skip_children = false
# show_parse_errors = true
# error_on_line_overflow = false
# error_on_unformatted = false)
# ignore = []
emit_mode = "Files"
make_backup = false
float_literal_trailing_zero = "IfNoPostfix"
# match_arm_indent = true
